<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anki – 3 Œuvres · 45 Citations</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Georgia', serif;
  background: #0a1628;
  color: #e8e0d0;
  min-height: 100vh;
  padding: 20px 14px 40px;
}

/* ── HEADER ── */
h1 {
  text-align: center;
  font-size: 1.15rem;
  color: #7ec8e3;
  letter-spacing: .06em;
  margin-bottom: 18px;
}

/* ── MODE TABS ── */
.mode-tabs {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.mode-tab {
  background: #0e1e30;
  border: 1px solid #2a3a50;
  color: #6a8aaa;
  padding: 6px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: .72rem;
  font-family: Georgia, serif;
  letter-spacing: .05em;
  transition: all .2s;
}
.mode-tab.active {
  border-color: #7ec8e3;
  color: #7ec8e3;
  background: #0e2a40;
}

/* ── WORK TABS ── */
.work-tabs {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
.work-tab {
  background: #0e2233;
  border: 1px solid #1e4a6a;
  color: #7a9ab0;
  padding: 7px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: .75rem;
  font-family: Georgia, serif;
  transition: all .2s;
  line-height: 1.3;
  text-align: center;
  max-width: 200px;
}
.work-tab.active {
  border-color: #7ec8e3;
  color: #7ec8e3;
  background: #0e2a40;
}
.work-tab .author {
  display: block;
  font-size: .65rem;
  color: #4a7a9a;
  margin-top: 2px;
}
.work-tab.active .author { color: #5a9ab8; }

/* ── NAV ── */
.nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 16px;
}
.nav button {
  background: #1a3a5c;
  border: 1px solid #2d6a8a;
  color: #7ec8e3;
  padding: 7px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: .9rem;
  transition: background .2s;
}
.nav button:hover { background: #1f4a72; }
.nav button:disabled { opacity: .32; cursor: default; }
.counter { color: #7a9ab0; font-size: .82rem; min-width: 55px; text-align: center; }

/* ── CARD ── */
.card-wrapper { max-width: 680px; margin: 0 auto; }
.card {
  background: #0e2233;
  border: 1px solid #1e4a6a;
  border-radius: 14px;
  min-height: 300px;
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.card.work-0::before { background: linear-gradient(90deg,#1e6a8a,#7ec8e3,#1e6a8a); }
.card.work-1::before { background: linear-gradient(90deg,#2a6a3a,#6ecf7a,#2a6a3a); }
.card.work-2::before { background: linear-gradient(90deg,#6a3a1e,#e3a87e,#6a3a1e); }

.theme-badge {
  display: inline-block;
  border: 1px solid;
  font-size: .68rem;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: .05em;
  text-transform: uppercase;
  margin-bottom: 16px;
  align-self: flex-start;
}
.work-0 .theme-badge { background:#0a2540; border-color:#1e4a6a; color:#7ec8e3; }
.work-1 .theme-badge { background:#0a2218; border-color:#1e4a2a; color:#6ecf7a; }
.work-2 .theme-badge { background:#251408; border-color:#5a3a1e; color:#e3a87e; }

/* RECTO */
.recto { display: block; }
.verso { display: none; }
.card.flipped .recto { display: none; }
.card.flipped .verso { display: block; }

.prompt-label {
  font-size: .7rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 9px;
}
.work-0 .prompt-label { color:#5a8aaa; }
.work-1 .prompt-label { color:#4a8a5a; }
.work-2 .prompt-label { color:#aa8a5a; }

.prompt-text { font-size: 1rem; line-height: 1.65; color: #c8dce8; font-style: italic; }
.prompt-hint { font-size: .76rem; color: #4a7a9a; margin-top: 12px; }

/* VERSO */
.citation {
  font-size: .94rem;
  line-height: 1.7;
  color: #e8dfc8;
  font-style: italic;
  border-left: 3px solid #2d6a8a;
  padding-left: 14px;
  margin-bottom: 13px;
}
.work-1 .citation { border-left-color: #2d8a4a; }
.work-2 .citation { border-left-color: #8a6a2d; }

.ref { font-size: .71rem; color: #5a8aaa; margin-bottom: 12px; }
.work-1 .ref { color: #5a9a6a; }
.work-2 .ref { color: #9a8a5a; }

.analyse {
  font-size: .79rem;
  color: #a0b8c8;
  line-height: 1.5;
  background: #081828;
  border-radius: 8px;
  padding: 9px 13px;
}
.work-1 .analyse { background: #081408; color: #a0c8a8; }
.work-2 .analyse { background: #180e04; color: #c8b898; }

.analyse strong { color: #7ec8e3; }
.work-1 .analyse strong { color: #6ecf7a; }
.work-2 .analyse strong { color: #e3a87e; }

/* FLIP BTN */
.flip-btn {
  border: none;
  color: #e8f4f8;
  padding: 11px 34px;
  border-radius: 8px;
  cursor: pointer;
  font-size: .9rem;
  display: block;
  margin: 16px auto 0;
  letter-spacing: .04em;
  transition: opacity .2s;
}
.flip-btn.work-0 { background: linear-gradient(135deg,#1a4a72,#1e6a8a); }
.flip-btn.work-1 { background: linear-gradient(135deg,#1a4a22,#1e7a3a); }
.flip-btn.work-2 { background: linear-gradient(135deg,#4a2a0a,#8a5a1e); }
.flip-btn:hover { opacity: .84; }

/* PROGRESS */
.progress-bar {
  max-width: 680px;
  margin: 13px auto 0;
  background: #0e2233;
  border-radius: 4px;
  height: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  transition: width .3s;
}
.progress-fill.work-0 { background: linear-gradient(90deg,#1e6a8a,#7ec8e3); }
.progress-fill.work-1 { background: linear-gradient(90deg,#1e6a3a,#6ecf7a); }
.progress-fill.work-2 { background: linear-gradient(90deg,#6a3a1e,#e3a87e); }

/* ════════════════════════════════
   MODE DICTÉE LIBRE
════════════════════════════════ */

/* FILTRE */
.dictee-filter {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-btn {
  background: #0e1e30;
  border: 1px solid #2a3a50;
  color: #6a8aaa;
  padding: 7px 20px;
  border-radius: 20px;
  cursor: pointer;
  font-size: .78rem;
  font-family: Georgia, serif;
  letter-spacing: .04em;
  transition: all .2s;
}
.filter-btn.active {
  border-color: #7ec8e3;
  color: #7ec8e3;
  background: #0e2a40;
}
.filter-btn:hover:not(.active) { border-color: #4a6a8a; color: #9ab8d0; }
#dicteeMode { display: none; }
#normalMode { display: block; }

.dictee-card {
  background: #0e2233;
  border: 1px solid #1e4a6a;
  border-radius: 14px;
  min-height: 320px;
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
  overflow: hidden;
  max-width: 680px;
  margin: 0 auto;
}
.dictee-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.dictee-card.dc-work-0::before { background: linear-gradient(90deg,#1e6a8a,#7ec8e3,#1e6a8a); }
.dictee-card.dc-work-1::before { background: linear-gradient(90deg,#2a6a3a,#6ecf7a,#2a6a3a); }
.dictee-card.dc-work-2::before { background: linear-gradient(90deg,#6a3a1e,#e3a87e,#6a3a1e); }

.dictee-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.dictee-oeuvre {
  font-size: .65rem;
  color: #4a7a9a;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.dc-work-1 .dictee-oeuvre { color: #4a8a5a; }
.dc-work-2 .dictee-oeuvre { color: #9a7a4a; }

.dictee-prompt-label {
  font-size: .7rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #5a8aaa;
  margin-bottom: 4px;
}
.dc-work-1 .dictee-prompt-label { color: #4a8a5a; }
.dc-work-2 .dictee-prompt-label { color: #aa8a5a; }

.dictee-prompt-text {
  font-size: 1rem;
  line-height: 1.65;
  color: #c8dce8;
  font-style: italic;
}
.dictee-hint {
  font-size: .75rem;
  color: #3a6a8a;
}

.dictee-textarea {
  width: 100%;
  min-height: 90px;
  background: #081828;
  border: 1px solid #1e3a5a;
  border-radius: 8px;
  color: #e8dfc8;
  font-family: Georgia, serif;
  font-size: .9rem;
  line-height: 1.6;
  padding: 10px 13px;
  resize: vertical;
  outline: none;
  transition: border-color .2s;
}
.dictee-textarea:focus { border-color: #2d6a8a; }
.dc-work-1 .dictee-textarea:focus { border-color: #2d8a4a; }
.dc-work-2 .dictee-textarea:focus { border-color: #8a6a2d; }

.dictee-textarea.correct {
  border-color: #3a9a4a !important;
  background: #061408;
}
.dictee-textarea.wrong {
  border-color: #9a3a3a !important;
  background: #180808;
}

.dictee-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.btn-verif {
  background: linear-gradient(135deg,#1a4a72,#1e6a8a);
  border: none;
  color: #e8f4f8;
  padding: 9px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-size: .85rem;
  font-family: Georgia, serif;
  letter-spacing: .04em;
  transition: opacity .2s;
}
.dc-work-1 .btn-verif { background: linear-gradient(135deg,#1a4a22,#1e7a3a); }
.dc-work-2 .btn-verif { background: linear-gradient(135deg,#4a2a0a,#8a5a1e); }
.btn-verif:hover { opacity: .84; }

.btn-skip {
  background: transparent;
  border: 1px solid #2a4a6a;
  color: #5a8aaa;
  padding: 9px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: .85rem;
  font-family: Georgia, serif;
  transition: border-color .2s, color .2s;
}
.btn-skip:hover { border-color: #5a8aaa; color: #7ec8e3; }

/* RÉSULTAT */
.dictee-result {
  display: none;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: .82rem;
  line-height: 1.6;
}
.dictee-result.show { display: block; }
.dictee-result.ok {
  background: #061408;
  border: 1px solid #2a6a3a;
  color: #6ecf7a;
}
.dictee-result.nok {
  background: #180808;
  border: 1px solid #6a2a2a;
  color: #e8b8b8;
}
.result-label {
  font-size: .7rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 6px;
  font-style: normal;
}
.result-citation {
  font-style: italic;
  color: #e8dfc8;
  border-left: 3px solid #2d6a8a;
  padding-left: 10px;
  margin-top: 8px;
}
.nok .result-citation { border-left-color: #8a4a2d; }
.ok .result-citation { border-left-color: #2d8a4a; }

/* score badge */
.dictee-score-bar {
  max-width: 680px;
  margin: 14px auto 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.dictee-progress {
  flex: 1;
  background: #0e2233;
  border-radius: 4px;
  height: 4px;
  overflow: hidden;
}
.dictee-progress-fill {
  height: 100%;
  background: linear-gradient(90deg,#1e6a8a,#7ec8e3);
  transition: width .3s;
}
.score-text {
  font-size: .75rem;
  color: #5a8aaa;
  min-width: 80px;
  text-align: right;
}

/* Session terminée */
.session-end {
  display: none;
  max-width: 680px;
  margin: 0 auto;
  background: #0e2233;
  border: 1px solid #1e4a6a;
  border-radius: 14px;
  padding: 36px 28px;
  text-align: center;
}
.session-end.show { display: block; }
.session-end h2 { color: #7ec8e3; font-size: 1.2rem; margin-bottom: 10px; }
.session-end .final-score { font-size: 2.8rem; color: #e8dfc8; margin: 18px 0; }
.session-end .final-score span { font-size: 1rem; color: #5a8aaa; }
.btn-restart {
  background: linear-gradient(135deg,#1a4a72,#1e6a8a);
  border: none;
  color: #e8f4f8;
  padding: 11px 30px;
  border-radius: 8px;
  cursor: pointer;
  font-size: .9rem;
  font-family: Georgia, serif;
  margin-top: 10px;
  transition: opacity .2s;
}
.btn-restart:hover { opacity: .84; }
</style>
</head>
<body>

<h1>Anki · 3 Œuvres · 45 Citations</h1>

<!-- MODE TABS -->
<div class="mode-tabs">
  <button class="mode-tab active" onclick="switchMode('normal')">📖 Révision</button>
  <button class="mode-tab" onclick="switchMode('dictee')">✍️ Dictée libre</button>
</div>

<!-- ══════════ MODE NORMAL ══════════ -->
<div id="normalMode">
  <div class="work-tabs">
    <button class="work-tab active" onclick="switchWork(0)">
      Vingt Mille Lieues sous les mers
      <span class="author">Jules Verne</span>
    </button>
    <button class="work-tab" onclick="switchWork(1)">
      La Connaissance de la vie
      <span class="author">Georges Canguilhem</span>
    </button>
    <button class="work-tab" onclick="switchWork(2)">
      Le Mur invisible
      <span class="author">Marlen Haushofer</span>
    </button>
  </div>

  <div class="nav">
    <button id="prevBtn" onclick="changeCard(-1)" disabled>◀</button>
    <span class="counter" id="counter">1 / 15</span>
    <button id="nextBtn" onclick="changeCard(1)">▶</button>
  </div>

  <div class="card-wrapper">
    <div class="card" id="card"></div>
    <button class="flip-btn work-0" onclick="flipCard()" id="flipBtn">Voir la citation ▾</button>
    <div class="progress-bar"><div class="progress-fill work-0" id="progressFill"></div></div>
  </div>
</div>

<!-- ══════════ MODE DICTÉE ══════════ -->
<div id="dicteeMode">

  <!-- Filtre ordre -->
  <div class="dictee-filter">
    <button class="filter-btn active" id="filterRandom" onclick="setFilter('random')">🔀 Aléatoire</button>
    <button class="filter-btn" id="filterOrder" onclick="setFilter('order')">🔢 Dans l'ordre</button>
  </div>

  <!-- Carte dictée -->
  <div class="dictee-card" id="dicteeCard">
    <div class="dictee-meta">
      <span class="theme-badge" id="dicteeTheme"></span>
      <span class="dictee-oeuvre" id="dicteeOeuvre"></span>
    </div>
    <div>
      <div class="dictee-prompt-label">Question</div>
      <div class="dictee-prompt-text" id="dicteePrompt"></div>
      <div class="dictee-hint" id="dicteeHint"></div>
    </div>
    <textarea class="dictee-textarea" id="dicteeInput" placeholder="Écrivez la citation ici…"></textarea>
    <div class="dictee-actions">
      <button class="btn-verif" id="btnVerif" onclick="verifier()">Vérifier ✓</button>
      <button class="btn-skip" onclick="nextDictee()">Passer →</button>
    </div>
    <div class="dictee-result" id="dicteeResult">
      <div class="result-label" id="resultLabel"></div>
      <div id="resultMsg"></div>
      <div class="result-citation" id="resultCitation"></div>
      <button class="btn-verif" style="margin-top:12px;" onclick="nextDictee()">Carte suivante →</button>
    </div>
  </div>

  <!-- Fin de session -->
  <div class="session-end" id="sessionEnd">
    <h2>Session terminée !</h2>
    <div class="final-score"><span id="finalOk">0</span> / <span id="finalTotal">0</span> <span>bonnes réponses</span></div>
    <div id="finalMsg" style="color:#a0b8c8;font-size:.85rem;margin-bottom:6px;"></div>
    <button class="btn-restart" onclick="startDictee()">Recommencer</button>
  </div>

  <!-- Barre de progression -->
  <div class="dictee-score-bar">
    <div class="dictee-progress"><div class="dictee-progress-fill" id="dicteeProgressFill" style="width:0%"></div></div>
    <div class="score-text" id="dicteeScoreText">0 / 0</div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   DONNÉES
══════════════════════════════════════════ */
const works = [
  /* 0 — VINGT MILLE LIEUES */
  [
    {
      theme:"Liberté & misanthropie",
      prompt:"Quelle est la devise philosophique de Nemo sur la liberté en mer ?",
      hint:"💡 Réplique au professeur Aronnax (partie I, chap. X)",
      citation:"« Ah ! monsieur, vivez, vivez au sein des mers ! Là seulement est l'indépendance ! Là je ne reconnais pas de maîtres ! Là je suis libre ! »",
      ref:"Partie I, chap. X, p. 125",
      analyse:"<strong>Thème :</strong> La mer comme espace d'affranchissement absolu. La triple exclamation et l'anaphore de « Là » signalent une <em>utopie sous-marine</em> : la mer s'oppose point par point à la société terrestre — contrainte, hiérarchie, enfermement."
    },
    {
      theme:"Rupture sociale",
      prompt:"En une phrase, comment Nemo résume-t-il son rapport à la société humaine ?",
      hint:"💡 Aveu capital (partie I, chap. X)",
      citation:"« J'ai rompu avec la société tout entière. »",
      ref:"Partie I, chap. X, p. 118",
      analyse:"<strong>Thème :</strong> Formule lapidaire, presque testamentaire. L'isolement volontaire n'est pas fuite mais <em>refus radical</em>. La brièveté de la phrase mime la rupture elle-même : nette, sans appel."
    },
    {
      theme:"Indicible / limite du langage",
      prompt:"Pourquoi Aronnax doute-t-il de pouvoir raconter ses aventures sous-marines ?",
      hint:"💡 Réflexion sur la narration (partie I, chap. XVI)",
      citation:"« comment pourrais-je retracer les impressions que m'a laissées cette promenade sous les eaux ? Les mots sont impuissants à raconter de telles merveilles ! »",
      ref:"Partie I, chap. XVI, p. 185",
      analyse:"<strong>Thème :</strong> Mise en abyme réflexive : le narrateur questionne sa propre capacité à écrire. Le sublime naturel <em>déborde</em> les ressources du langage — motif romantique au cœur du roman."
    },
    {
      theme:"Nature & machine",
      prompt:"Quel renversement s'opère quand les personnages comprennent ce qu'est vraiment le « monstre » ?",
      hint:"💡 Moment de reconnaissance du Nautilus (partie I, chap. VII)",
      citation:"« L'animal, le monstre, le phénomène naturel qui avait intrigué le monde savant tout entier [...] c'était un phénomène plus étonnant encore, un phénomène de main d'homme. »",
      ref:"Partie I, chap. VII, p. 90",
      analyse:"<strong>Thème :</strong> Passage du naturel à l'artificiel. Verne interroge : jusqu'où la technique peut-elle imiter — surpasser — la nature ? Le vrai prodige est humain, non animal."
    },
    {
      theme:"Écologie / tuer pour tuer",
      prompt:"Comment Nemo condamne-t-il la chasse à la baleine pratiquée par les hommes ?",
      hint:"💡 Échange avec Ned Land (partie II, chap. XII)",
      citation:"« Ici, ce serait tuer pour tuer. Je sais bien que c'est un privilège réservé à l'homme, mais je n'admets pas ces passe-temps meurtriers. [...] vos pareils, maître Land, commettent une action blâmable. »",
      ref:"Partie II, chap. XII, p. 457",
      analyse:"<strong>Thème :</strong> Rare discours écologiste au XIXe s. Nemo renverse la supériorité humaine en vice : « privilège » devient synonyme de « blâmable ». Ned Land, chasseur, incarne l'instinct destructeur ordinaire."
    },
    {
      theme:"Majesté de la mer",
      prompt:"Quelle métaphore Nemo emploie-t-il pour définir la mer comme source de toute vie ?",
      hint:"💡 Discours fondateur de Nemo (partie I, chap. X)",
      citation:"« la mer est le vaste réservoir de la nature »",
      ref:"Partie I, chap. X, p. 125",
      analyse:"<strong>Thème :</strong> La mer n'est pas un décor mais un <em>principe vital</em>. Le mot « réservoir » (réserve + source) concentre l'idée d'une nature inépuisable qui précède et dépasse l'homme."
    },
    {
      theme:"Violence de Nemo",
      prompt:"Comment Nemo justifie-t-il sa haine et sa vengeance devant Aronnax ?",
      hint:"💡 Destruction du navire ennemi (partie II, chap. XXI)",

      analyse:"<strong>Thème :</strong> La catastrophe révèle l'idolâtrie technologique : l'humanité avait divinisé ses propres outils. Sans hommes pour les entretenir, ces « dieux » ne sont que ferraille — critique de la modernité techniciste."
    }
  ]
];

const workNames = [
  "Vingt Mille Lieues",
  "Connaissance de la vie",
  "Le Mur invisible"
];

/* ══════════════════════════════════════════
   MODE NORMAL
══════════════════════════════════════════ */
let currentWork = 0;
let currentCard = 0;
let flipped = false;

function switchWork(idx) {
  currentWork = idx;
  currentCard = 0;
  flipped = false;
  document.querySelectorAll('.work-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  const flipBtn = document.getElementById('flipBtn');
  flipBtn.className = `flip-btn work-${idx}`;
  document.getElementById('progressFill').className = `progress-fill work-${idx}`;
  render();
}

function render() {
  const c = works[currentWork][currentCard];
  const card = document.getElementById('card');
  card.className = `card work-${currentWork}`;
  flipped = false;
  document.getElementById('flipBtn').textContent = 'Voir la citation ▾';
  document.getElementById('counter').textContent = `${currentCard + 1} / 15`;
  document.getElementById('prevBtn').disabled = currentCard === 0;
  document.getElementById('nextBtn').disabled = currentCard === 14;
  const pct = ((currentCard + 1) / 15 * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';

  card.innerHTML = `
    <div class="recto">
      <span class="theme-badge">${c.theme}</span>
      <div>
        <div class="prompt-label">Question</div>
        <div class="prompt-text">${c.prompt}</div>
        <div class="prompt-hint">${c.hint}</div>
      </div>
    </div>
    <div class="verso">
      <span class="theme-badge">${c.theme}</span>
      <div class="citation">${c.citation}</div>
      <div class="ref">📖 ${c.ref}</div>
      <div class="analyse">${c.analyse}</div>
    </div>
  `;
}

function flipCard() {
  flipped = !flipped;
  const card = document.getElementById('card');
  if (flipped) {
    card.classList.add('flipped');
    document.getElementById('flipBtn').textContent = 'Masquer ▴';
  } else {
    card.classList.remove('flipped');
    document.getElementById('flipBtn').textContent = 'Voir la citation ▾';
  }
}

function changeCard(dir) {
  currentCard = Math.max(0, Math.min(14, currentCard + dir));
  render();
}

/* ══════════════════════════════════════════
   MODE DICTÉE
══════════════════════════════════════════ */
let dicteeQueue = [];
let dicteeIndex = 0;
let dicteeOk = 0;
let dicteeTotal = 0;
let dicteeVerified = false;
let dicteeFilter = 'random';

function setFilter(f) {
  dicteeFilter = f;
  document.getElementById('filterRandom').classList.toggle('active', f === 'random');
  document.getElementById('filterOrder').classList.toggle('active', f === 'order');
  startDictee();
}

function switchMode(mode) {
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  if (mode === 'normal') {
    document.getElementById('normalMode').style.display = 'block';
    document.getElementById('dicteeMode').style.display = 'none';
    document.querySelector('.mode-tab:nth-child(1)').classList.add('active');
  } else {
    document.getElementById('normalMode').style.display = 'none';
    document.getElementById('dicteeMode').style.display = 'block';
    document.querySelector('.mode-tab:nth-child(2)').classList.add('active');
    startDictee();
  }
}

function buildQueue() {
  let all = [];
  if (dicteeFilter === 'order') {
    // Interleave : citation 1 Verne, citation 1 Canguilhem, citation 1 Haushofer, citation 2 Verne…
    for (let i = 0; i < 15; i++) {
      works.forEach((work, wi) => {
        all.push({ ...work[i], workIdx: wi });
      });
    }
  } else {
    // Aléatoire (Fisher-Yates)
    works.forEach((work, wi) => {
      work.forEach(card => all.push({ ...card, workIdx: wi }));
    });
    for (let i = all.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [all[i], all[j]] = [all[j], all[i]];
    }
  }
  return all;
}

function startDictee() {
  dicteeQueue = buildQueue();
  dicteeIndex = 0;
  dicteeOk = 0;
  dicteeTotal = 0;
  dicteeVerified = false;

  document.getElementById('dicteeCard').style.display = 'flex';
  document.getElementById('sessionEnd').classList.remove('show');
  renderDictee();
}

function renderDictee() {
  dicteeVerified = false;
  const c = dicteeQueue[dicteeIndex];
  const wi = c.workIdx;

  const card = document.getElementById('dicteeCard');
  card.className = `dictee-card dc-work-${wi}`;

  document.getElementById('dicteeTheme').textContent = c.theme;
  document.getElementById('dicteeTheme').className = `theme-badge`;
  document.getElementById('dicteeOeuvre').textContent = workNames[wi];

  document.getElementById('dicteePrompt').textContent = c.prompt;
  document.getElementById('dicteeHint').textContent = c.hint;

  const ta = document.getElementById('dicteeInput');
  ta.value = '';
  ta.className = 'dictee-textarea';
  ta.disabled = false;
  ta.placeholder = 'Écrivez la citation ici…';
  ta.focus();

  const res = document.getElementById('dicteeResult');
  res.className = 'dictee-result';
  res.style.display = 'none';

  document.getElementById('btnVerif').style.display = 'inline-block';

  updateDicteeProgress();
}

function normalize(str) {
  return str
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')  // accents
    .replace(/[«»""''‹›]/g, '')                         // guillemets
    .replace(/[.,;:!?…\-–—]/g, '')                      // ponctuation
    .replace(/\s+/g, ' ')
    .trim();
}

function similarity(a, b) {
  // Ratio de mots communs (simple mais efficace)
  const wa = new Set(normalize(a).split(' ').filter(w => w.length > 2));
  const wb = new Set(normalize(b).split(' ').filter(w => w.length > 2));
  if (wa.size === 0 || wb.size === 0) return 0;
  let common = 0;
  wa.forEach(w => { if (wb.has(w)) common++; });
  return common / Math.max(wa.size, wb.size);
}

function verifier() {
  if (dicteeVerified) return;
  dicteeVerified = true;

  const c = dicteeQueue[dicteeIndex];
  const input = document.getElementById('dicteeInput').value;
  const score = similarity(input, c.citation);
  const isOk = score >= 0.65; // seuil de 65% de mots-clés corrects

  dicteeTotal++;
  if (isOk) dicteeOk++;

  const ta = document.getElementById('dicteeInput');
  ta.disabled = true;
  ta.className = 'dictee-textarea ' + (isOk ? 'correct' : 'wrong');

  const res = document.getElementById('dicteeResult');
  res.style.display = 'block';
  res.className = 'dictee-result show ' + (isOk ? 'ok' : 'nok');

  document.getElementById('resultLabel').textContent = isOk ? '✓ Bonne réponse !' : '✗ Pas tout à fait…';
  document.getElementById('resultMsg').textContent = isOk
    ? 'Excellent ! Voici la citation exacte :'
    : (input.trim() === '' ? 'Vous n\'avez rien écrit. La citation était :' : 'Voici la citation exacte :');
  document.getElementById('resultCitation').textContent = c.citation;

  document.getElementById('btnVerif').style.display = 'none';
  updateDicteeProgress();
}

function nextDictee() {
  dicteeIndex++;
  if (dicteeIndex >= dicteeQueue.length) {
    showSessionEnd();
  } else {
    renderDictee();
  }
}

function showSessionEnd() {
  document.getElementById('dicteeCard').style.display = 'none';
  const end = document.getElementById('sessionEnd');
  end.classList.add('show');
  document.getElementById('finalOk').textContent = dicteeOk;
  document.getElementById('finalTotal').textContent = dicteeTotal;
  const pct = Math.round(dicteeOk / dicteeTotal * 100);
  let msg = '';
  if (pct >= 90) msg = '🏆 Excellent ! Vous maîtrisez très bien ces citations.';
  else if (pct >= 70) msg = '👍 Bien joué ! Encore quelques révisions et ce sera parfait.';
  else if (pct >= 50) msg = '📚 Continuez à réviser, vous progressez !';
  else msg = '💪 Ne vous découragez pas, relisez les citations et réessayez.';
  document.getElementById('finalMsg').textContent = msg;
  updateDicteeProgress();
}

function updateDicteeProgress() {
  const total = dicteeQueue.length;
  const done = dicteeTotal;
  const pct = total > 0 ? (done / total * 100).toFixed(0) : 0;
  document.getElementById('dicteeProgressFill').style.width = pct + '%';
  document.getElementById('dicteeScoreText').textContent = `${dicteeOk} ✓ / ${dicteeTotal} répondues`;
}

// Allow Enter key to submit (Shift+Enter = newline)
document.addEventListener('keydown', function(e) {
  if (document.getElementById('dicteeMode').style.display !== 'none') {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!dicteeVerified) verifier();
    }
  }
});

// Init
render();
</script>
</body>
</html>
